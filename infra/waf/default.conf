server {
    listen 80;
    server_name ${WAF_SERVER_NAME};
    client_max_body_size ${WAF_CLIENT_MAX_BODY_SIZE};

    location = /__waf_health {
        access_log off;
        return 200 "SecRAG WAF is running\n";
    }

    location / {
        proxy_pass ${WAF_PROXY_PASS};
        proxy_http_version 1.1;
        proxy_set_header Host ${DOLLAR}host;
        proxy_set_header X-Real-IP ${DOLLAR}remote_addr;
        proxy_set_header X-Forwarded-For ${DOLLAR}proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto ${DOLLAR}scheme;
        proxy_connect_timeout ${WAF_PROXY_CONNECT_TIMEOUT};
        proxy_send_timeout ${WAF_PROXY_SEND_TIMEOUT};
        proxy_read_timeout ${WAF_PROXY_READ_TIMEOUT};
    }
}
